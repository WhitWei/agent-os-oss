# OpenTelemetry Collector Configuration for Agent OS MVP
# =======================================================
# Receives OTLP traces/gRPC from the application and
# exports them to the self-hosted Langfuse instance.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  otlphttp/langfuse:
    endpoint: http://langfuse-web:3000/api/public/otel
    # Langfuse public key is passed via environment variable
    headers:
      Authorization: "Bearer ${LANGFUSE_PUBLIC_KEY}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/langfuse]
